<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบห้องสมุดโรงเรียน 📚</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts (Sarabun) -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f8f9fa;
        }
        .navbar-brand {
            font-weight: 600;
        }
        .navbar .nav-link {
            color: #000000 !important;
            font-weight: 600 !important;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">📚 ห้องสมุดโรงเรียน</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="/">แดชบอร์ด</a>
                    </li>
                    
                    <!-- System Management Dropdown -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="systemDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            ⚙️ จัดการระบบ
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="systemDropdown">
                            <li><a class="dropdown-item" href="/books">📚 จัดการหนังสือ</a></li>
                            <li><a class="dropdown-item" href="/categories">📂 จัดการหมวดหมู่</a></li>
                            <li><a class="dropdown-item" href="/members">👥 จัดการสมาชิก</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="/logs">📋 ประวัติการใช้งาน</a></li>
                        </ul>
                    </li>

                    <li class="nav-item">
                        <a class="btn btn-warning text-dark ms-lg-2 fw-bold px-3 shadow-sm" href="/borrow">➕ ยืมหนังสือ</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <div class="container my-4">
        {% block content %}
        <!-- เนื้อหาของแต่ละหน้าจะมาลงตรงนี้ -->
        {% endblock %}
    </div>

    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
