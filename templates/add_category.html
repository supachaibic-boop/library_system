{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white py-3">
                <h4 class="mb-0 fw-bold">➕ เพิ่มหมวดหมู่ใหม่</h4>
            </div>
            <div class="card-body p-4">
                <form action="/categories/add" method="post">
                    <div class="mb-4">
                        <label class="form-label fw-semibold">ชื่อหมวดหมู่</label>
                        <input type="text" name="name" class="form-control" placeholder="เช่น วิทยาศาสตร์, วรรณกรรม, การ์ตูน" required>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4 w-100">บันทึกหมวดหมู่</button>
                        <a href="/categories" class="btn btn-outline-secondary px-4 w-100">ยกเลิก</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
